server {
    listen 4205;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Optional: Handle proxying if you ever want to serve API from same domain
    # location /api {
    #     proxy_pass http://extractor-api:4206;
    # }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
